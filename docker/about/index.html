<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>About process-bar-2</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f5f5;
        color: #111827;
      }

      main {
        width: min(32rem, calc(100vw - 2rem));
        padding: 2rem;
        border-radius: 1rem;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }

      nav {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }

      a {
        color: #0f766e;
        text-decoration: none;
        font-weight: 600;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: 2rem;
      }

      p {
        margin: 0;
        font-size: 1.125rem;
      }
    </style>
  </head>
  <body>
    <main>
      <nav aria-label="Primary">
        <a href="/">Home</a>
        <a href="/about/">About</a>
      </nav>
      <h1>About process-bar-2</h1>
      <p>This deployment serves the current static placeholder app and exposes a working internal navigation path for browser verification.</p>
    </main>
  </body>
</html>
